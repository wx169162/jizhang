<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="小账本">
    <meta name="theme-color" content="#c4b5fd">
    <title>小账本</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --bg-page: #faf8f5;
            --card-bg: #ffffff;
            --primary: #c4b5fd;
            --primary-light: #ede9fe;
            --primary-dark: #8b5cf6;
            --text-main: #1e1e2f;
            --text-sub: #6b7280;
            --border-light: #e9e4f0;
            --shadow: 0 2px 8px rgba(0,0,0,0.02);
            --radius-card: 16px;
            --danger: #fca5a5;
            --warning: #fde68a;
            --cancel-bg: #fce4ec;
            --cancel-text: #e91e63;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-page); color: var(--text-main); min-height: 100vh; padding-bottom: 80px; }
        .page { display: none; padding: 14px 14px 20px; max-width: 480px; margin: 0 auto; }
        .page.active { display: block; }
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
        h1 { font-size: 24px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
        h2 { font-size: 20px; font-weight: 600; }
        .card { background: var(--card-bg); border-radius: var(--radius-card); padding: 16px 14px; box-shadow: var(--shadow); border: 1px solid var(--border-light); margin-bottom: 14px; }
        .btn { background: var(--primary-dark); color: white; border: none; padding: 10px 16px; border-radius: 30px; font-weight: 500; font-size: 14px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 6px; }
        .btn-cancel { background: var(--cancel-bg); color: var(--cancel-text); border: none; padding: 10px 16px; border-radius: 30px; font-weight: 500; font-size: 14px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 6px; }
        .btn-outline { background: transparent; color: var(--text-main); border: 1px solid var(--border-light); }
        .btn-small { padding: 6px 12px; font-size: 13px; }
        .btn-danger { background: var(--danger); color: var(--text-main); }
        input, select, textarea { width: 100%; padding: 10px 12px; border: 1px solid var(--border-light); border-radius: 14px; background: var(--card-bg); font-size: 15px; font-family: inherit; }
        .form-row { margin-bottom: 12px; }
        label { font-size: 13px; font-weight: 500; color: var(--text-sub); display: block; margin-bottom: 4px; }
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.95); backdrop-filter: blur(8px); display: flex; justify-content: space-around; padding: 8px 12px 16px; border-top: 1px solid var(--border-light); max-width: 480px; margin: 0 auto; z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 2px; font-size: 11px; color: var(--text-sub); background: none; border: none; cursor: pointer; padding: 6px 14px; border-radius: 30px; }
        .nav-item.active { background: var(--primary-light); color: var(--primary-dark); font-weight: 500; }
        .category-scroll { display: flex; gap: 10px; overflow-x: auto; padding: 4px 2px 12px; -webkit-overflow-scrolling: touch; }
        .category-scroll::-webkit-scrollbar { display: none; }
        .category-card { flex: 0 0 100px; background: var(--card-bg); border-radius: 20px; padding: 14px 8px; border: 1px solid var(--border-light); text-align: center; cursor: pointer; }
        .category-card.active { border: 2px solid var(--primary-dark); background: var(--primary-light); }
        .reminder-item { background: var(--warning); border-radius: 14px; padding: 10px 14px; margin: 8px 0; display: flex; align-items: center; gap: 10px; }
        .reminder-item.danger { background: var(--danger); }
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); z-index: 1000; display: none; align-items: center; justify-content: center; }
        .modal.show { display: flex; }
        .modal-content { background: var(--card-bg); border-radius: 24px; padding: 20px; width: 90%; max-width: 380px; max-height: 80vh; overflow-y: auto; }
        .avatar { width: 48px; height: 48px; border-radius: 24px; background: var(--primary-light); overflow: hidden; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .pet-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border-light); cursor: pointer; }
        .pet-item.longpress { background: var(--primary-light); }
        .tabs { display: flex; gap: 4px; margin-bottom: 14px; }
        .tab { flex: 1; padding: 8px; border: none; background: transparent; border-radius: 20px; font-weight: 500; cursor: pointer; }
        .tab.active { background: var(--primary-dark); color: white; }
        .view-switch { display: flex; gap: 8px; margin-bottom: 14px; }
        .view-switch button { flex: 1; padding: 8px; border-radius: 20px; border: 1px solid var(--border-light); background: transparent; }
        .view-switch button.active { background: var(--primary-dark); color: white; }
        .record-card { background: var(--card-bg); border-radius: 14px; padding: 12px; margin: 8px 0; border: 1px solid var(--border-light); }
        .context-menu { position: fixed; background: white; border-radius: 14px; box-shadow: 0 6px 20px rgba(0,0,0,0.1); z-index: 2000; padding: 6px; display: none; }
        .context-menu.show { display: block; }
        .context-menu-item { padding: 10px 18px; cursor: pointer; border-radius: 10px; display: flex; align-items: center; gap: 8px; }
        .context-menu-item.delete { color: #dc2626; }
        
        /* 消费分析左右布局 */
        .analysis-layout {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        .pie-container {
            flex: 1;
            min-width: 150px;
        }
        .detail-container {
            flex: 1;
            min-width: 150px;
            max-height: 180px;
            overflow-y: auto;
            padding-left: 12px;
            border-left: 1px solid var(--border-light);
        }
        .pie-detail-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--border-light);
            cursor: pointer;
        }
        .pie-detail-item:hover {
            background: var(--primary-light);
        }
        .pie-detail-color {
            width: 12px;
            height: 12px;
            border-radius: 12px;
            display: inline-block;
            margin-right: 8px;
        }
        
        .pet-selector {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            margin-bottom: 12px;
            padding-bottom: 8px;
        }
        .pet-chip {
            padding: 6px 14px;
            border-radius: 20px;
            background: var(--card-bg);
            border: 1px solid var(--border-light);
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
        }
        .pet-chip.active {
            background: var(--primary-dark);
            color: white;
            border-color: var(--primary-dark);
        }
        
        .compare-card {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            background: var(--primary-light);
            border-radius: 14px;
            margin-bottom: 8px;
        }
        .compare-change {
            font-size: 14px;
            font-weight: 500;
        }
        .compare-change.up { color: #dc2626; }
        .compare-change.down { color: #10b981; }
        
        .file-input-label {
            display: inline-block;
            background: var(--primary-dark);
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 13px;
            cursor: pointer;
            margin-right: 8px;
        }
        .file-input-label input {
            display: none;
        }
        
        /* 宠物详情弹窗样式 */
        .pet-detail-header {
            text-align: center;
            margin-bottom: 20px;
        }
        .pet-detail-avatar {
            width: 80px;
            height: 80px;
            margin: 0 auto 12px;
        }
        .pet-detail-name {
            font-size: 20px;
            font-weight: 600;
        }
        .pet-detail-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
            padding: 12px;
            background: var(--primary-light);
            border-radius: 16px;
        }
        .pet-detail-info-item {
            text-align: center;
        }
        .pet-detail-info-label {
            font-size: 12px;
            color: var(--text-sub);
        }
        .pet-detail-info-value {
            font-size: 16px;
            font-weight: 600;
            color: var(--primary-dark);
        }
        
        /* 宠生大事样式 */
        .life-event-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-light);
        }
        .life-event-content {
            flex: 1;
        }
        .life-event-date {
            font-size: 12px;
            color: var(--text-sub);
            margin-bottom: 4px;
        }
        .life-event-title {
            font-weight: 500;
        }
        .life-event-note {
            font-size: 12px;
            color: var(--text-sub);
            margin-top: 2px;
        }
        .delete-event-btn {
            background: none;
            border: none;
            color: var(--text-sub);
            cursor: pointer;
            padding: 4px 8px;
        }
        
        /* 事项记录样式 */
        .task-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-light);
        }
        .task-badge {
            background: var(--primary-light);
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 11px;
            color: var(--primary-dark);
        }
        
        /* 弹窗按钮组 */
        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }
        .modal-buttons button {
            flex: 1;
        }
        
        @media (max-width: 400px) {
            .analysis-layout {
                flex-direction: column;
            }
            .detail-container {
                border-left: none;
                border-top: 1px solid var(--border-light);
                padding-left: 0;
                padding-top: 12px;
                margin-top: 8px;
                max-height: 200px;
            }
        }
    </style>
</head>
<body>

<!-- 首页 -->
<div id="pageHome" class="page active">
    <div class="header">
        <h1><i data-lucide="paw-print"></i> 小账本</h1>
        <button class="btn-outline btn-small" onclick="app.showPage('settings')"><i data-lucide="settings"></i></button>
    </div>
    <div class="view-switch">
        <button class="active" data-view="month" onclick="app.setViewMode('month')">月</button>
        <button data-view="year" onclick="app.setViewMode('year')">年</button>
    </div>
    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px;">
        <span id="currentPeriodDisplay">2026.04</span>
        <div style="display: flex; gap: 8px;">
            <button onclick="app.prevPeriod()"><i data-lucide="chevron-left"></i></button>
            <button onclick="app.nextPeriod()"><i data-lucide="chevron-right"></i></button>
        </div>
    </div>
    <div class="card">
        <div style="display: flex; justify-content: space-between;">
            <span style="color: var(--text-sub);">总支出</span>
            <span style="font-size: 26px; font-weight: 700; color: var(--primary-dark);" id="periodTotalAmount">¥0.00</span>
        </div>
    </div>
    <div class="card" id="reminderCard" style="display: none;">
        <h3 style="font-size: 16px; margin-bottom: 8px;"><i data-lucide="bell"></i> 待办提醒</h3>
        <div id="reminderList"></div>
    </div>
    <div class="card">
        <div style="display: flex; justify-content: space-between; margin-bottom: 12px;">
            <h3 style="font-size: 16px;"><i data-lucide="folder"></i> 家族</h3>
            <button class="btn-outline btn-small" onclick="app.showAddCategory()"><i data-lucide="plus"></i> 家族</button>
        </div>
        <div class="category-scroll" id="categoryScroll"></div>
        <div id="filterBadge" style="display: none; background: var(--primary-light); padding: 4px 12px; border-radius: 20px; margin-top: 8px;">
            <span id="filterText"></span>
            <i data-lucide="x" style="width: 16px; cursor: pointer;" onclick="app.clearFilter()"></i>
        </div>
    </div>
    <div class="card">
        <h3 style="font-size: 16px; margin-bottom: 12px;"><i data-lucide="list"></i> 流水</h3>
        <div id="recordsContainer"></div>
    </div>
</div>

<!-- 记录页（记账+体重） -->
<div id="pageRecord" class="page">
    <div class="header"><h2>记录</h2></div>
    <div class="tabs">
        <button class="tab active" onclick="app.setRecordTab('expense')">记账</button>
        <button class="tab" onclick="app.setRecordTab('weight')">体重记录</button>
        <button class="tab" onclick="app.setRecordTab('task')">事项记录</button>
    </div>
    <div id="expenseRecordContent">
        <div class="card">
            <div class="form-row"><label>金额</label><input type="number" id="amountInput" step="0.01"></div>
            <div class="form-row"><label>日期</label><input type="date" id="dateInput"></div>
            <div class="form-row"><label>所属宠物</label><select id="petSelect"></select></div>
            <div class="form-row"><label>家族</label><select id="categoryTypeSelect"></select></div>
            <div class="form-row"><label>类别</label><select id="expenseCategorySelect"></select></div>
            <div class="form-row"><label>支付</label><select id="paymentSelect"><option>微信</option><option>支付宝</option><option>现金</option></select></div>
            <div class="form-row"><label>备注</label><textarea id="noteInput" rows="2"></textarea></div>
            <div class="form-row" style="display: flex; gap: 8px;">
                <label style="display: flex; align-items: center; gap: 4px;">
                    <input type="checkbox" id="isRecurring"> 定期记账
                </label>
                <select id="recurringPeriod" style="display: none; width: auto;">
                    <option value="monthly">每月</option>
                    <option value="quarterly">每季</option>
                    <option value="yearly">每年</option>
                </select>
            </div>
            <div class="modal-buttons">
                <button class="btn" onclick="app.addRecord()"><i data-lucide="plus"></i> 保存</button>
            </div>
        </div>
    </div>
    <div id="weightRecordContent" style="display: none;">
        <div class="card">
            <div class="form-row"><label>宠物</label><select id="weightRecordPetSelect"></select></div>
            <div class="form-row"><label>日期</label><input type="date" id="weightRecordDate"></div>
            <div class="form-row"><label>体重 (kg)</label><input type="number" id="weightRecordValue" step="0.01"></div>
            <div class="form-row"><label>备注</label><input type="text" id="weightRecordNote"></div>
            <div class="modal-buttons">
                <button class="btn" onclick="app.addWeightRecord()"><i data-lucide="plus"></i> 保存</button>
            </div>
        </div>
        <div class="card">
            <h3>体重变化趋势</h3>
            <div style="height:200px;"><canvas id="weightTrendChart"></canvas></div>
        </div>
    </div>
    <div id="taskRecordContent" style="display: none;">
        <div class="card">
            <div class="form-row"><label>宠物</label><select id="taskRecordPetSelect"></select></div>
            <div class="form-row"><label>事项</label><select id="taskTypeSelect">
                <option value="驱虫">驱虫</option>
                <option value="疫苗">疫苗</option>
                <option value="洗澡">洗澡</option>
                <option value="体检">体检</option>
                <option value="其他">其他</option>
            </select></div>
            <div class="form-row"><label>日期</label><input type="date" id="taskRecordDateInput"></div>
            <div class="form-row"><label>备注</label><input type="text" id="taskRecordNoteInput" placeholder="如：下次驱虫时间、疫苗品牌等"></div>
            <div class="modal-buttons">
                <button class="btn" onclick="app.addTaskRecord()"><i data-lucide="plus"></i> 保存</button>
            </div>
        </div>
        <div class="card">
            <h3>最近事项记录</h3>
            <div id="recentTaskList"></div>
        </div>
    </div>
</div>

<!-- 档案页 -->
<div id="pagePets" class="page">
    <div class="header">
        <h2>宠物档案</h2>
        <button class="btn-outline btn-small" onclick="app.showAddCategory()"><i data-lucide="plus"></i> 家族</button>
    </div>
    <div id="categoryListContainer"></div>
</div>

<!-- 统计页 -->
<div id="pageStats" class="page">
    <div class="header"><h2>统计</h2></div>
    <div class="tabs">
        <button class="tab active" onclick="app.setStatTab('expense')">支出统计</button>
        <button class="tab" onclick="app.setStatTab('petStats')">宠物统计</button>
    </div>
    <div id="expenseStatContent">
        <div style="display: flex; gap: 6px; margin-bottom: 14px;">
            <button class="btn-outline btn-small" onclick="app.setStatPeriod('day')">日</button>
            <button class="btn-outline btn-small" onclick="app.setStatPeriod('month')">月</button>
            <button class="btn-outline btn-small" onclick="app.setStatPeriod('year')">年</button>
            <input type="date" id="statDatePicker" style="flex:1;">
        </div>
        <div class="card">
            <div style="display: flex; justify-content: space-between;">
                <span id="statTotalLabel">总支出</span>
                <span id="statTotalAmount" style="font-size: 26px; font-weight: 700; color: var(--primary-dark);">¥0.00</span>
            </div>
            <div id="compareInfo" style="font-size: 12px; color: var(--text-sub); margin-top: 8px;"></div>
        </div>
        <div class="card">
            <h3>消费分析</h3>
            <div class="analysis-layout">
                <div class="pie-container">
                    <div style="height:160px;"><canvas id="pieChart"></canvas></div>
                </div>
                <div class="detail-container" id="pieDetailContainer">
                    <div style="text-align: center; color: var(--text-sub); padding: 20px 0;">点击饼图查看详情</div>
                </div>
            </div>
        </div>
        <div class="card">
            <h3>近6个月趋势</h3>
            <div style="height:160px;"><canvas id="trendChart"></canvas></div>
        </div>
    </div>
    <div id="petStatsContent" style="display: none;">
        <div class="card">
            <h3>按宠物查看账单</h3>
            <div id="petBillSelector" class="pet-selector"></div>
            <div id="petBillList"></div>
        </div>
        <div class="card">
            <h3>年度对比报表</h3>
            <select id="compareYearSelect"></select>
            <div id="yearCompareContainer"></div>
        </div>
    </div>
</div>

<!-- 设置页 -->
<div id="pageSettings" class="page">
    <div class="header"><h2>设置</h2></div>
    <div class="card">
        <h3>支出类别</h3>
        <div id="expenseCategoryList"></div>
        <div style="display: flex; gap: 6px; margin-top: 10px;">
            <input type="text" id="newExpenseCatName" placeholder="新类别">
            <button class="btn-small btn" onclick="app.addExpenseCategory()"><i data-lucide="plus"></i></button>
        </div>
    </div>
    <div class="card">
        <h3>定期记账</h3>
        <div id="recurringList"></div>
    </div>
    <div class="card">
        <h3>预算设置</h3>
        <div class="form-row">
            <label>月度预算</label>
            <input type="number" id="monthlyBudget" step="0.01" placeholder="输入预算金额">
            <button class="btn btn-small" style="margin-top: 8px;" onclick="app.saveBudget()">保存预算</button>
        </div>
        <div id="budgetDisplay" style="margin-top: 12px;"></div>
    </div>
    <div class="card">
        <h3>数据</h3>
        <div style="display: flex; flex-wrap: wrap; gap: 8px;">
            <button class="btn-outline btn-small" onclick="app.exportData()"><i data-lucide="download"></i> 导出数据</button>
            <label class="file-input-label">
                <i data-lucide="upload"></i> 导入数据
                <input type="file" id="importFileInput" accept=".json" onchange="app.importData(this)">
            </label>
            <button class="btn-danger btn-small" onclick="app.resetAllData()"><i data-lucide="alert-triangle"></i> 重置</button>
        </div>
    </div>
    <div style="text-align:center; margin-top:16px; color:var(--text-sub);">小账本 v2.5 · 正式版</div>
</div>

<!-- 底部导航 -->
<div class="nav-bar">
    <button class="nav-item active" data-page="home" onclick="app.showPage('home')"><i data-lucide="home"></i>首页</button>
    <button class="nav-item" data-page="record" onclick="app.showPage('record')"><i data-lucide="edit-3"></i>记录</button>
    <button class="nav-item" data-page="pets" onclick="app.showPage('pets')"><i data-lucide="cat"></i>档案</button>
    <button class="nav-item" data-page="stats" onclick="app.showPage('stats')"><i data-lucide="chart-pie"></i>统计</button>
</div>

<!-- 弹窗 -->
<div class="modal" id="addCategoryModal">
    <div class="modal-content">
        <h3>新建家族</h3>
        <div class="form-row"><input type="text" id="newCategoryName" placeholder="名称"></div>
        <div class="form-row"><input type="text" id="newCategoryIcon" placeholder="图标 (cat/fish/dog)" value="cat"></div>
        <div class="modal-buttons">
            <button class="btn-cancel" onclick="app.closeAddCategory()">取消</button>
            <button class="btn" onclick="app.saveCategory()">创建</button>
        </div>
    </div>
</div>

<div class="modal" id="petEditModal">
    <div class="modal-content">
        <h3 id="petEditTitle">添加宠物</h3>
        <input type="hidden" id="editPetId">
        <input type="hidden" id="editPetCategoryId">
        <div style="display: flex; justify-content: center; margin-bottom: 16px;">
            <div class="avatar" id="petAvatarPreview" onclick="app.selectAvatar()">
                <i data-lucide="camera"></i>

<script>
(function(){
    'use strict';
    
    const DEFAULT_DATA = {
        categories: [],
        pets: [],
        records: [],
        expenseCategories: [{ name: '食品' }, { name: '医疗' }, { name: '玩具' }, { name: '美容' }, { name: '日用' }],
        weightRecords: [],
        recurringRecords: [],
        monthlyBudget: null,
        lifeEvents: [],     // 宠生大事：绝育、生病、搬家等
        taskRecords: []     // 事项记录：驱虫、疫苗、洗澡等
    };
    
    let appData = JSON.parse(JSON.stringify(DEFAULT_DATA));
    const STORAGE_KEY = 'pet_v25_full';
    const OLD_STORAGE_KEYS = ['pet_v24_full', 'pet_v23_full', 'pet_v22_full', 'pet_v21_full'];

    function migrateOldData() {
        for (let oldKey of OLD_STORAGE_KEYS) {
            try {
                const oldData = localStorage.getItem(oldKey);
                if (oldData) {
                    const parsed = JSON.parse(oldData);
                    if (parsed.categories && (!appData.categories.length)) appData.categories = parsed.categories;
                    if (parsed.pets && (!appData.pets.length)) appData.pets = parsed.pets;
                    if (parsed.records && (!appData.records.length)) appData.records = parsed.records;
                    if (parsed.expenseCategories && (!appData.expenseCategories.length)) appData.expenseCategories = parsed.expenseCategories;
                    if (parsed.weightRecords && (!appData.weightRecords.length)) appData.weightRecords = parsed.weightRecords;
                    if (parsed.recurringRecords && (!appData.recurringRecords.length)) appData.recurringRecords = parsed.recurringRecords;
                    if (parsed.monthlyBudget && (!appData.monthlyBudget)) appData.monthlyBudget = parsed.monthlyBudget;
                    
                    // 迁移旧的生命事件
                    if (parsed.lifeEvents && (!appData.lifeEvents.length)) appData.lifeEvents = parsed.lifeEvents;
                    
                    // 迁移旧的任务记录
                    if (parsed.taskRecords && (!appData.taskRecords.length)) appData.taskRecords = parsed.taskRecords;
                    
                    // 从旧的 taskTemplates 和 pets.tasks 迁移
                    if (parsed.taskTemplates && parsed.pets) {
                        parsed.pets.forEach(pet => {
                            if (pet.tasks && pet.tasks.length) {
                                pet.tasks.forEach(task => {
                                    if (task.records && task.records.length) {
                                        const template = parsed.taskTemplates.find(t => t.id === task.templateId);
                                        task.records.forEach(record => {
                                            if (!appData.taskRecords.some(t => t.petId === pet.id && t.date === record.date && t.type === (template?.name || '事项'))) {
                                                appData.taskRecords.push({
                                                    id: Date.now() + Math.random(),
                                                    petId: pet.id,
                                                    type: template?.name || '事项',
                                                    date: record.date,
                                                    note: record.note || ''
                                                });
                                            }
                                        });
                                    }
                                });
                            }
                        });
                    }
                    
                    localStorage.removeItem(oldKey);
                    console.log(`已从 ${oldKey} 迁移数据`);
                }
            } catch(e) { console.log(`迁移 ${oldKey} 失败:`, e); }
        }
    }
    
    function loadData() {
        try {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                const parsed = JSON.parse(saved);
                appData.categories = parsed.categories || [];
                appData.pets = parsed.pets || [];
                appData.records = parsed.records || [];
                appData.expenseCategories = parsed.expenseCategories || DEFAULT_DATA.expenseCategories;
                appData.weightRecords = parsed.weightRecords || [];
                appData.recurringRecords = parsed.recurringRecords || [];
                appData.monthlyBudget = parsed.monthlyBudget || null;
                appData.lifeEvents = parsed.lifeEvents || [];
                appData.taskRecords = parsed.taskRecords || [];
            }
            
            migrateOldData();
            
            appData.records.forEach(r => { if (r.petId === undefined) r.petId = ''; });
            
            saveData();
        } catch(e) { 
            console.log('加载失败，使用默认数据', e);
            appData = JSON.parse(JSON.stringify(DEFAULT_DATA));
        }
    }
    
    function saveData() { 
        try { 
            localStorage.setItem(STORAGE_KEY, JSON.stringify(appData)); 
        } catch(e){ console.log('保存失败', e); }
    }

    function showToast(msg, ok=true) {
        const toast = document.createElement('div');
        toast.style.cssText = `position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:${ok?'#1e1e2f':'#fca5a5'}; color:white; padding:10px 20px; border-radius:30px; z-index:9999;`;
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 1800);
    }

    const getToday = () => new Date().toISOString().slice(0,10);
    const formatYMD = (d) => { if(!d) return ''; const dt = new Date(d); return `${dt.getMonth()+1}月${dt.getDate()}日`; };
    const getWeekday = (d) => ['周日','周一','周二','周三','周四','周五','周六'][new Date(d).getDay()];
    
    function calculateAge(birthday) {
        if (!birthday) return '未设置';
        const birth = new Date(birthday);
        const today = new Date();
        let years = today.getFullYear() - birth.getFullYear();
        let months = today.getMonth() - birth.getMonth();
        if (months < 0) {
            years--;
            months += 12;
        }
        if (years > 0) {
            return `${years}岁${months > 0 ? months + '个月' : ''}`;
        } else if (months > 0) {
            return `${months}个月`;
        } else {
            return '小于1个月';
        }
    }

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page' + pageId.charAt(0).toUpperCase() + pageId.slice(1)).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.querySelector(`.nav-item[data-page="${pageId}"]`)?.classList.add('active');
        if (pageId === 'home') renderHome();
        else if (pageId === 'record') { renderRecordForm(); renderWeightTrendChart(); renderRecentTasks(); }
        else if (pageId === 'pets') renderPetsPage();
        else if (pageId === 'stats') renderStatsPage();
        else if (pageId === 'settings') renderSettings();
        setTimeout(() => lucide.createIcons(), 10);
    }

    let viewMode = 'month', currentYear = new Date().getFullYear(), currentMonth = new Date().getMonth()+1, filterCategoryId = null;
    let statPeriod = 'month', statYear = new Date().getFullYear(), statMonth = new Date().getMonth()+1, statDay = new Date().getDate();
    let pieChart=null, trendChart=null, weightChart=null, weightTrendChart=null;
    let statTab = 'expense', recordTab = 'expense';
    let tempAvatar = null;
    let contextRecordId = null;
    let pendingDeletePetId = null;

    function setViewMode(m) { viewMode = m; document.querySelectorAll('.view-switch button').forEach(b=>b.classList.remove('active')); document.querySelector(`.view-switch button[data-view="${m}"]`).classList.add('active'); renderHome(); }
    function prevPeriod() { if(viewMode==='month'){ currentMonth--; if(currentMonth<1){ currentMonth=12; currentYear--; } } else { currentYear--; } renderHome(); }
    function nextPeriod() { if(viewMode==='month'){ currentMonth++; if(currentMonth>12){ currentMonth=1; currentYear++; } } else { currentYear++; } renderHome(); }
    function getPeriodFilter() {
        return (r) => {
            if(!r.date) return false;
            const d = new Date(r.date);
            let match = viewMode==='month' ? d.getFullYear()===currentYear && d.getMonth()+1===currentMonth : d.getFullYear()===currentYear;
            if(match && filterCategoryId) match = r.categoryId === filterCategoryId;
            return match;
        };
    }
    function filterByCategory(id) { filterCategoryId = id; renderHome(); }
    function clearFilter() { filterCategoryId = null; renderHome(); }

    function getReminders() {
        const reminders = [];
        const today = new Date();
        appData.taskRecords.forEach(task => {
            const taskDate = new Date(task.date);
            const daysDiff = Math.floor((today - taskDate) / 86400000);
            // 驱虫90天、疫苗365天、洗澡30天提醒
            let threshold = 90;
            if (task.type === '疫苗') threshold = 365;
            if (task.type === '洗澡') threshold = 30;
            if (task.type === '体检') threshold = 180;
            if (daysDiff >= threshold) {
                const pet = appData.pets.find(p => p.id === task.petId);
                if (pet) {
                    reminders.push({ pet: pet.name, petId: pet.id, task: task.type, days: daysDiff, threshold: threshold });
                }
            }
        });
        return reminders;
    }

    function renderHome() {
        document.getElementById('currentPeriodDisplay').innerText = viewMode==='month' ? `${currentYear}.${String(currentMonth).padStart(2,'0')}` : `${currentYear}`;
        const filtered = appData.records.filter(getPeriodFilter());
        const total = filtered.reduce((s,r)=> s+(parseFloat(r.amount)||0),0);
        document.getElementById('periodTotalAmount').innerText = `¥${total.toFixed(2)}`;

        const reminders = getReminders();
        const reminderCard = document.getElementById('reminderCard');
        if (reminders.length) {
            reminderCard.style.display = 'block';
            document.getElementById('reminderList').innerHTML = reminders.map(r => {
                return `<div class="reminder-item">
                    <i data-lucide="clock"></i>
                    <div style="flex:1;"><b>${r.pet}</b> ${r.task} · ${r.days}天前</div>
                    <button class="btn-small btn-outline" onclick="app.quickAddTask('${r.petId}','${r.task}')">记录</button>
                </div>`;
            }).join('');
        } else { reminderCard.style.display = 'none'; }

        const scroll = document.getElementById('categoryScroll');
        if(appData.categories.length) {
            scroll.innerHTML = appData.categories.map(cat => {
                const catTotal = appData.records.filter(r => r.categoryId === cat.id && 
                    (viewMode==='month' ? new Date(r.date).getFullYear()===currentYear && new Date(r.date).getMonth()+1===currentMonth : new Date(r.date).getFullYear()===currentYear)
                ).reduce((s,r)=> s+(parseFloat(r.amount)||0),0);
                return `<div class="category-card ${filterCategoryId===cat.id?'active':''}" onclick="app.filterByCategory('${cat.id}')">
                    <div><i data-lucide="${cat.icon||'cat'}"></i></div>
                    <div style="font-weight:600;">${cat.name}</div>
                    <div style="color:var(--primary-dark);">¥${catTotal.toFixed(0)}</div>
                </div>`;
            }).join('');
        } else { scroll.innerHTML = '<div style="padding:16px;">点击"家族"添加</div>'; }

        const badge = document.getElementById('filterBadge');
        if(filterCategoryId) {
            const cat = appData.categories.find(c=>c.id===filterCategoryId);
            document.getElementById('filterText').innerHTML = `<i data-lucide="${cat?.icon||'cat'}"></i> 只看${cat?.name}`;
            badge.style.display = 'inline-flex';
        } else { badge.style.display = 'none'; }

        const container = document.getElementById('recordsContainer');
        if(viewMode==='month') {
            const byDay = {};
            filtered.sort((a,b)=> (b.date||'').localeCompare(a.date||'')).forEach(r => { if(!byDay[r.date]) byDay[r.date]=[]; byDay[r.date].push(r); });
            let html = '';
            Object.keys(byDay).forEach(date => {
                const dayTotal = byDay[date].reduce((s,r)=> s+(parseFloat(r.amount)||0),0);
                html += `<div class="day-group"><div style="display:flex; justify-content:space-between; padding:6px 2px;"><span>${formatYMD(date)} ${getWeekday(date)}</span><span>¥${dayTotal.toFixed(2)}</span></div>`;
                byDay[date].forEach(r => {
                    const cat = appData.categories.find(c=>c.id===r.categoryId);
                    const pet = appData.pets.find(p=>p.id===r.petId);
                    html += `<div class="record-card" data-record-id="${r.id}" oncontextmenu="app.showContextMenu(event,'${r.id}');return false;">
                        <div style="display:flex; justify-content:space-between;"><span>${r.expenseCategory} ${pet ? '· '+pet.name : ''}</span><span>¥${parseFloat(r.amount).toFixed(2)}</span></div>
                        <div style="border-top:1px dashed var(--border-light); margin:8px 0;"></div>
                        <div style="display:flex; justify-content:space-between; color:var(--text-sub);"><span>${r.note||''}</span><span>${cat?.name||''}</span></div>
                    </div>`;
                });
                html += '</div>';
            });
            container.innerHTML = html || '<div style="padding:20px;text-align:center;">暂无流水</div>';
        }
        setTimeout(() => lucide.createIcons(), 10);
    }

    function showContextMenu(e, id) { e.preventDefault(); contextRecordId = id; const menu = document.getElementById('contextMenu'); menu.style.left = (e.touches?.[0]?.clientX || e.clientX) + 'px'; menu.style.top = (e.touches?.[0]?.clientY || e.clientY) + 'px'; menu.classList.add('show'); setTimeout(() => document.addEventListener('click', ()=> menu.classList.remove('show'), {once:true}), 50); }
    function contextEdit() {
        const r = appData.records.find(r=> r.id == contextRecordId); if (!r) return;
        document.getElementById('editRecordId').value = r.id;
        document.getElementById('editAmountInput').value = r.amount;
        document.getElementById('editDateInput').value = r.date;
        document.getElementById('editNoteInput').value = r.note||'';
        document.getElementById('editPetSelect').innerHTML = '<option value="">无</option>' + appData.pets.map(p=>`<option value="${p.id}" ${p.id===r.petId?'selected':''}>${p.name}</option>`).join('');
        document.getElementById('editCategorySelect').innerHTML = appData.categories.map(c=>`<option value="${c.id}" ${c.id===r.categoryId?'selected':''}>${c.name}</option>`).join('');
        document.getElementById('editExpenseCategorySelect').innerHTML = appData.expenseCategories.map(ec=>`<option ${ec.name===r.expenseCategory?'selected':''}>${ec.name}</option>`).join('');
        document.getElementById('editPaymentSelect').value = r.payment;
        document.getElementById('editRecordModal').classList.add('show');
    }
    function contextDelete() { if (!confirm('删除？')) return; appData.records = appData.records.filter(r=> r.id != contextRecordId); saveData(); renderHome(); showToast('已删除'); }
    function closeEditModal() { document.getElementById('editRecordModal').classList.remove('show'); }
    function saveEditRecord() {
        const r = appData.records.find(r=> r.id == document.getElementById('editRecordId').value); if (!r) return;
        r.amount = parseFloat(document.getElementById('editAmountInput').value);
        r.date = document.getElementById('editDateInput').value;
        r.petId = document.getElementById('editPetSelect').value;
        r.categoryId = document.getElementById('editCategorySelect').value;
        r.expenseCategory = document.getElementById('editExpenseCategorySelect').value;
        r.payment = document.getElementById('editPaymentSelect').value;
        r.note = document.getElementById('editNoteInput').value;
        saveData(); closeEditModal(); renderHome(); showToast('已更新');
    }

    // 快速添加事项记录
    function quickAddTask(petId, taskType) {
        document.getElementById('taskRecordPetSelect').value = petId;
        document.getElementById('taskTypeSelect').value = taskType;
        document.getElementById('taskRecordDateInput').value = getToday();
        document.getElementById('taskRecordNoteInput').value = '';
        document.getElementById('taskRecordContent').style.display = 'block';
        document.querySelector('#pageRecord .tab.active').classList.remove('active');
        document.querySelector('#pageRecord .tab:nth-child(3)').classList.add('active');
        document.getElementById('expenseRecordContent').style.display = 'none';
        document.getElementById('weightRecordContent').style.display = 'none';
        document.getElementById('taskRecordContent').style.display = 'block';
        showPage('record');
    }
    
    function addTaskRecord() {
        const petId = document.getElementById('taskRecordPetSelect').value;
        if (!petId) return showToast('请选择宠物', false);
        const type = document.getElementById('taskTypeSelect').value;
        const date = document.getElementById('taskRecordDateInput').value;
        if (!date) return showToast('请选择日期', false);
        const note = document.getElementById('taskRecordNoteInput').value;
        
        appData.taskRecords.push({
            id: Date.now() + Math.random(),
            petId: petId,
            type: type,
            date: date,
            note: note
        });
        saveData();
        showToast('事项已记录');
        document.getElementById('taskRecordNoteInput').value = '';
        renderRecentTasks();
        if (document.getElementById('pageHome').classList.contains('active')) renderHome();
    }
    
    function renderRecentTasks() {
        const recentTasks = [...appData.taskRecords].sort((a,b) => (b.date||'').localeCompare(a.date||'')).slice(0, 10);
        const container = document.getElementById('recentTaskList');
        if (!container) return;
        
        if (recentTasks.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:20px; color:var(--text-sub);">暂无事项记录</div>';
            return;
        }
        
        container.innerHTML = recentTasks.map(task => {
            const pet = appData.pets.find(p => p.id === task.petId);
            return `<div class="task-item">
                <div>
                    <div class="task-badge">${task.type}</div>
                    <div style="font-size: 13px; margin-top: 4px;">${pet ? pet.name : '未知宠物'} · ${formatYMD(task.date)}</div>
                    ${task.note ? `<div style="font-size: 12px; color: var(--text-sub); margin-top: 2px;">${task.note}</div>` : ''}
                </div>
                <button class="delete-event-btn" onclick="app.deleteTaskRecord('${task.id}')"><i data-lucide="trash-2" style="width: 16px;"></i></button>
            </div>`;
        }).join('');
        lucide.createIcons();
    }
    
    function deleteTaskRecord(id) {
        if (confirm('删除这条记录？')) {
            appData.taskRecords = appData.taskRecords.filter(t => t.id != id);
            saveData();
            renderRecentTasks();
            if (document.getElementById('pageHome').classList.contains('active')) renderHome();
            showToast('已删除');
        }
    }

    function renderRecordForm() {
        document.getElementById('dateInput').value = getToday();
        document.getElementById('petSelect').innerHTML = '<option value="">无</option>' + appData.pets.map(p=>`<option value="${p.id}">${p.name}</option>`).join('');
        document.getElementById('categoryTypeSelect').innerHTML = appData.categories.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
        document.getElementById('expenseCategorySelect').innerHTML = appData.expenseCategories.map(ec=>`<option>${ec.name}</option>`).join('');
        document.getElementById('weightRecordPetSelect').innerHTML = appData.pets.map(p=>`<option value="${p.id}">${p.name}</option>`).join('');
        document.getElementById('weightRecordDate').value = getToday();
        document.getElementById('taskRecordPetSelect').innerHTML = appData.pets.map(p=>`<option value="${p.id}">${p.name}</option>`).join('');
        document.getElementById('taskRecordDateInput').value = getToday();
        
        const chk = document.getElementById('isRecurring');
        const periodSelect = document.getElementById('recurringPeriod');
        if (chk) chk.onchange = () => { periodSelect.style.display = chk.checked ? 'inline-block' : 'none'; };
    }
    
    function addRecord() {
        const amt = parseFloat(document.getElementById('amountInput').value);
        if(!amt) return showToast('金额无效', false);
        if(!appData.categories.length) return showToast('请先创建家族', false);
        const newRecord = {
            id: Date.now()+Math.random(), 
            amount: amt, 
            date: document.getElementById('dateInput').value,
            petId: document.getElementById('petSelect').value,
            categoryId: document.getElementById('categoryTypeSelect').value,
            expenseCategory: document.getElementById('expenseCategorySelect').value,
            payment: document.getElementById('paymentSelect').value,
            note: document.getElementById('noteInput').value
        };
        appData.records.push(newRecord);
        
        if(document.getElementById('isRecurring') && document.getElementById('isRecurring').checked) {
            const period = document.getElementById('recurringPeriod').value;
            appData.recurringRecords.push({
                id: Date.now()+Math.random(),
                record: newRecord,
                period: period,
                lastDate: newRecord.date
            });
            showToast('已保存并设为定期记账');
        } else {
            showToast('已保存');
        }
        
        saveData(); showPage('home');
    }
    
    function addWeightRecord() {
        const petId = document.getElementById('weightRecordPetSelect').value;
        if (!petId) return showToast('请选择宠物', false);
        const weight = parseFloat(document.getElementById('weightRecordValue').value);
        if (!weight) return showToast('请输入体重', false);
        
        appData.weightRecords.push({
            id: Date.now()+Math.random(),
            petId: petId,
            date: document.getElementById('weightRecordDate').value,
            weight: weight,
            note: document.getElementById('weightRecordNote').value || ''
        });
        saveData();

    function confirmDeletePet(action) {
        if (!pendingDeletePetId) return;
        if (action === 'both') {
            appData.records = appData.records.filter(r => r.petId !== pendingDeletePetId);
            appData.weightRecords = appData.weightRecords.filter(w => w.petId !== pendingDeletePetId);
            appData.lifeEvents = appData.lifeEvents.filter(e => e.petId !== pendingDeletePetId);
            appData.taskRecords = appData.taskRecords.filter(t => t.petId !== pendingDeletePetId);
            appData.pets = appData.pets.filter(p => p.id !== pendingDeletePetId);
            showToast('已删除宠物及其所有记录');
        } else if (action === 'keep') {
            appData.records.forEach(r => { if (r.petId === pendingDeletePetId) r.petId = ''; });
            appData.weightRecords = appData.weightRecords.filter(w => w.petId !== pendingDeletePetId);
            appData.lifeEvents = appData.lifeEvents.filter(e => e.petId !== pendingDeletePetId);
            appData.taskRecords = appData.taskRecords.filter(t => t.petId !== pendingDeletePetId);
            appData.pets = appData.pets.filter(p => p.id !== pendingDeletePetId);
            showToast('已删除宠物，其他记录已保留');
        }
        saveData();
        closeDeletePetModal();
        renderPetsPage();
        if (document.getElementById('pageHome').classList.contains('active')) renderHome();
    }

    function setStatPeriod(p) { statPeriod = p; renderStatsPage(); }

    function renderStatsPage() {
        const picker = document.getElementById('statDatePicker');
        picker.value = `${statYear}-${String(statMonth).padStart(2,'0')}-${String(statDay).padStart(2,'0')}`;
        picker.onchange = () => { const d=new Date(picker.value); statYear=d.getFullYear(); statMonth=d.getMonth()+1; statDay=d.getDate(); renderStatsPage(); };
        
        const filtered = appData.records.filter(r=>{ if(!r.date) return false; const d=new Date(r.date); if(statPeriod==='day') return d.getFullYear()===statYear && d.getMonth()+1===statMonth && d.getDate()===statDay; if(statPeriod==='month') return d.getFullYear()===statYear && d.getMonth()+1===statMonth; return d.getFullYear()===statYear; });
        const total = filtered.reduce((s,r)=> s+(parseFloat(r.amount)||0),0);
        document.getElementById('statTotalAmount').innerText = `¥${total.toFixed(2)}`;
        
        let compareText = '';
        if(statPeriod === 'month') {
            const prevMonth = new Date(statYear, statMonth-2, 1);
            const prevFiltered = appData.records.filter(r=>{ if(!r.date) return false; const d=new Date(r.date); return d.getFullYear()===prevMonth.getFullYear() && d.getMonth()===prevMonth.getMonth(); });
            const prevTotal = prevFiltered.reduce((s,r)=> s+(parseFloat(r.amount)||0),0);
            if(prevTotal > 0) {
                const change = ((total - prevTotal) / prevTotal * 100).toFixed(1);
                compareText = `环比上月: ${change > 0 ? '↑' : '↓'} ${Math.abs(change)}%`;
            }
        } else if(statPeriod === 'year') {
            const prevYear = statYear - 1;
            const prevFiltered = appData.records.filter(r=>{ if(!r.date) return false; const d=new Date(r.date); return d.getFullYear()===prevYear; });
            const prevTotal = prevFiltered.reduce((s,r)=> s+(parseFloat(r.amount)||0),0);
            if(prevTotal > 0) {
                const change = ((total - prevTotal) / prevTotal * 100).toFixed(1);
                compareText = `同比去年: ${change > 0 ? '↑' : '↓'} ${Math.abs(change)}%`;
            }
        }
        document.getElementById('compareInfo').innerHTML = compareText;
        
        const catTotals = {}; 
        appData.categories.forEach(c=> { catTotals[c.id]={ name: c.name, amount: 0, icon: c.icon || 'cat' }; });
        filtered.forEach(r=> { if(catTotals[r.categoryId]) catTotals[r.categoryId].amount += parseFloat(r.amount)||0; });
        
        const colors = ['#c4b5fd','#fde68a','#bae6fd','#a7f3d0','#fbcfe8','#fed7aa','#fecaca','#d9f99d'];
        const labels = [], amounts = [], bgColors = [], categoryIds = [];
        let idx = 0;
        for(let catId in catTotals) {
            if(catTotals[catId].amount > 0) {
                labels.push(catTotals[catId].name);
                amounts.push(catTotals[catId].amount);
                bgColors.push(colors[idx % colors.length]);
                categoryIds.push(catId);
                idx++;
            }
        }
        
        const ctx = document.getElementById('pieChart').getContext('2d');
        if(pieChart) pieChart.destroy();
        pieChart = new Chart(ctx, { 
            type:'pie', 
            data:{ labels: labels, datasets:[{ data: amounts, backgroundColor: bgColors }] },
            options: {
                onClick: (e, activeEls) => {
                    if(activeEls.length) {
                        const index = activeEls[0].index;
                        const catId = categoryIds[index];
                        const category = appData.categories.find(c => c.id === catId);
                        if(category) {
                            renderPieDetail(category, filtered, bgColors[index]);
                        }
                    }
                }
            }
        });
        
        function renderPieDetail(category, filteredRecords, color) {
            const detailContainer = document.getElementById('pieDetailContainer');
            if(!detailContainer) return;
            
            const catRecords = filteredRecords.filter(r => r.categoryId === category.id);
            const expenseTotals = {};
            catRecords.forEach(r => {
                if(!expenseTotals[r.expenseCategory]) expenseTotals[r.expenseCategory] = 0;
                expenseTotals[r.expenseCategory] += parseFloat(r.amount) || 0;
            });
            
            const sortedExpenses = Object.entries(expenseTotals).sort((a, b) => b[1] - a[1]);
            
            let html = `<div style="margin-bottom: 12px; font-weight: 500; display: flex; align-items: center; gap: 8px;">
                <i data-lucide="${category.icon || 'cat'}" style="width: 20px; height: 20px;"></i>
                <span>${category.name} 详细支出</span>
            </div>`;
            
            for(let [expName, expAmount] of sortedExpenses) {
                html += `<div class="pie-detail-item">
                    <span><span class="pie-detail-color" style="background: ${color}"></span>${expName}</span>
                    <span>¥${expAmount.toFixed(2)}</span>
                </div>`;
            }
            
            if(Object.keys(expenseTotals).length === 0) {
                html += '<div style="text-align:center; padding:12px; color:var(--text-sub);">暂无支出记录</div>';
            }
            
            detailContainer.innerHTML = html;
            lucide.createIcons();
        }
        
        if(categoryIds.length > 0) {
            const firstCat = appData.categories.find(c => c.id === categoryIds[0]);
            if(firstCat) {
                renderPieDetail(firstCat, filtered, bgColors[0]);
            }
        } else {
            document.getElementById('pieDetailContainer').innerHTML = '<div style="text-align:center; padding:20px 0; color:var(--text-sub);">点击饼图查看详情</div>';
        }

        const months=[], totalsTrend=[];
        for(let i=5; i>=0; i--) { const d=new Date(new Date().getFullYear(), new Date().getMonth()-i, 1); months.push(`${d.getMonth()+1}月`); totalsTrend.push(appData.records.filter(r=>{ if(!r.date) return false; const rd=new Date(r.date); return rd.getFullYear()===d.getFullYear() && rd.getMonth()===d.getMonth(); }).reduce((s,r)=> s+(parseFloat(r.amount)||0),0)); }
        const tCtx = document.getElementById('trendChart').getContext('2d');
        if(trendChart) trendChart.destroy();
        trendChart = new Chart(tCtx, { type:'bar', data:{ labels:months, datasets:[{ data:totalsTrend, backgroundColor:'#c4b5fd' }] }, options:{ plugins:{ legend:{ display:false } } } });
    }
    
    function renderPetStatsPage() {
        const selector = document.getElementById('petBillSelector');
        selector.innerHTML = appData.pets.map(p => `<div class="pet-chip" onclick="app.showPetBill('${p.id}')">${p.name}</div>`).join('');
        
        const yearSelect = document.getElementById('compareYearSelect');
        const years = [...new Set(appData.records.map(r => new Date(r.date).getFullYear()).filter(y => y))];
        yearSelect.innerHTML = years.map(y => `<option value="${y}">${y}年</option>`).join('');
        if(years.length) yearSelect.onchange = () => renderYearCompare(yearSelect.value);
        if(years.length) renderYearCompare(years[0]);
    }
    
    function showPetBill(petId) {
        const pet = appData.pets.find(p => p.id === petId);
        const records = appData.records.filter(r => r.petId === petId).sort((a,b) => (b.date||'').localeCompare(a.date||''));
        const total = records.reduce((s,r) => s + (parseFloat(r.amount)||0), 0);
        
        let html = `<div style="margin-bottom: 12px;"><strong>${pet.name}</strong> 总消费: ¥${total.toFixed(2)}</div>`;
        const byMonth = {};
        records.forEach(r => {
            const month = new Date(r.date).getMonth() + 1;
            if(!byMonth[month]) byMonth[month] = 0;
            byMonth[month] += parseFloat(r.amount) || 0;
        });
        html += '<div style="margin-top: 12px;">月度分布:</div>';
        for(let m = 1; m <= 12; m++) {
            if(byMonth[m]) {
                html += `<div style="display: flex; justify-content: space-between; padding: 4px 0;">
                    <span>${m}月</span><span>¥${byMonth[m].toFixed(2)}</span>
                </div>`;
            }
        }
        html += '<div style="margin-top: 12px;">账单明细:</div>';
        records.forEach(r => {
            const cat = appData.categories.find(c => c.id === r.categoryId);
            html += `<div style="padding: 8px 0; border-bottom: 1px solid var(--border-light);">
                <div>${r.date} | ${r.expenseCategory} | ¥${parseFloat(r.amount).toFixed(2)}</div>
                <div style="font-size: 12px; color: var(--text-sub);">${cat?.name || ''} ${r.note ? '· ' + r.note : ''}</div>
            </div>`;
        });
        document.getElementById('petBillList').innerHTML = html || '<div>暂无账单</div>';
        lucide.createIcons();
    }
    
    function renderYearCompare(year) {
        const thisYear = appData.records.filter(r => new Date(r.date).getFullYear() == year);
        const lastYear = appData.records.filter(r => new Date(r.date).getFullYear() == year - 1);
        
        const thisTotal = thisYear.reduce((s,r) => s + (parseFloat(r.amount)||0), 0);
        const lastTotal = lastYear.reduce((s,r) => s + (parseFloat(r.amount)||0), 0);
        const change = lastTotal ? ((thisTotal - lastTotal) / lastTotal * 100).toFixed(1) : 0;
        
        let html = `<div class="compare-card">
            <div>${year}年总支出</div>
            <div><strong>¥${thisTotal.toFixed(2)}</strong></div>
        </div>`;
        if(lastTotal > 0) {
            html += `<div class="compare-card">
                <div>相比${year-1}年</div>
                <div class="compare-change ${change > 0 ? 'up' : 'down'}">${change > 0 ? '↑' : '↓'} ${Math.abs(change)}%</div>
            </div>`;
        }
        
        html += `<div style="margin-top: 12px;"><strong>各宠物支出对比</strong></div>`;
        appData.pets.forEach(pet => {
            const petThis = thisYear.filter(r => r.petId === pet.id).reduce((s,r) => s + (parseFloat(r.amount)||0), 0);
            const petLast = lastYear.filter(r => r.petId === pet.id).reduce((s,r) => s + (parseFloat(r.amount)||0), 0);
            if(petThis > 0 || petLast > 0) {
                const petChange = petLast ? ((petThis - petLast) / petLast * 100).toFixed(1) : 100;
                html += `<div style="display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border-light);">
                    <span>${pet.name}</span>
                    <span>¥${petThis.toFixed(2)}</span>
                    ${petLast > 0 ? `<span class="compare-change ${petChange > 0 ? 'up' : 'down'}" style="font-size: 12px;">${petChange > 0 ? '↑' : '↓'} ${Math.abs(petChange)}%</span>` : '<span style="font-size: 12px; color: var(--text-sub);">新增</span>'}
                </div>`;
            }
        });
        
        document.getElementById('yearCompareContainer').innerHTML = html;
    }

    function renderBudget() {
        const budget = appData.monthlyBudget || 0;
        document.getElementById('monthlyBudget').value = budget;
        
        const currentMonth = new Date().getMonth() + 1;
        const currentYear = new Date().getFullYear();
        const monthSpending = appData.records.filter(r => {
            if(!r.date) return false;
            const d = new Date(r.date);
            return d.getFullYear() === currentYear && d.getMonth() + 1 === currentMonth;
        }).reduce((s,r) => s + (parseFloat(r.amount)||0), 0);
        
        let html = `<div>本月预算: ¥${budget.toFixed(2)}</div>`;
        html += `<div>本月已用: ¥${monthSpending.toFixed(2)}</div>`;
        if(budget > 0) {
            const percent = (monthSpending / budget * 100).toFixed(1);
            html += `<div>预算使用: ${percent}%</div>`;
            if(monthSpending > budget) {
                html += `<div style="color: #dc2626; margin-top: 8px;">⚠️ 已超预算 ¥${(monthSpending - budget).toFixed(2)}</div>`;
            } else {
                html += `<div style="color: #10b981; margin-top: 8px;">✅ 剩余预算 ¥${(budget - monthSpending).toFixed(2)}</div>`;
            }
        }
        document.getElementById('budgetDisplay').innerHTML = html;
    }
    
    function saveBudget() {
        const budget = parseFloat(document.getElementById('monthlyBudget').value);
        appData.monthlyBudget = budget;
        saveData();
        renderBudget();
        showToast('预算已保存');
    }

    function renderSettings() {
        document.getElementById('expenseCategoryList').innerHTML = appData.expenseCategories.map((ec,i)=>`<div style="display:flex; justify-content:space-between; padding:6px 0;"><span>${ec.name}</span><button class="btn-outline btn-small" onclick="app.removeExpenseCategory(${i})"><i data-lucide="trash-2"></i></button></div>`).join('');
        
        const recurringHtml = appData.recurringRecords.map((r,i) => {
            return `<div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border-light);">
                <div>${r.record.expenseCategory} - ¥${r.record.amount}<br><small>${r.period} | 上次: ${r.lastDate}</small></div>
                <button class="btn-outline btn-small" onclick="app.deleteRecurring(${i})"><i data-lucide="trash-2"></i></button>
            </div>`;
        }).join('');
        document.getElementById('recurringList').innerHTML = recurringHtml || '<div>暂无定期记账</div>';
        
        renderBudget();
        lucide.createIcons();
    }
    
    function deleteRecurring(index) {
        appData.recurringRecords.splice(index, 1);
        saveData();
        renderSettings();
        showToast('已删除');
    }
    
    function exportData() {
        const dataStr = JSON.stringify(appData, null, 2);
        const blob = new Blob([dataStr], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `xiaozhangben_backup_${new Date().toISOString().slice(0,10)}.json`;
        a.click();
        URL.revokeObjectURL(url);
        showToast('导出成功');
    }
    
    function importData(input) {
        const file = input.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const imported = JSON.parse(e.target.result);
                if (imported.categories && imported.pets && imported.records) {
                    appData = imported;
                    if (!appData.lifeEvents) appData.lifeEvents = [];
                    if (!appData.taskRecords) appData.taskRecords = [];
                    saveData();
                    showToast('导入成功！刷新页面查看');
                    setTimeout(() => location.reload(), 1500);
                } else {
                    showToast('文件格式错误', false);
                }
            } catch(err) {
                showToast('解析失败', false);
            }
        };
        reader.readAsText(file);
        input.value = '';
    }
    
    function addExpenseCategory() { const n=document.getElementById('newExpenseCatName').value.trim(); if(!n) return; appData.expenseCategories.push({ name:n }); saveData(); renderSettings(); document.getElementById('newExpenseCatName').value=''; showToast('已添加'); }
    function removeExpenseCategory(i) { appData.expenseCategories.splice(i,1); saveData(); renderSettings(); }
    function resetAllData() { if(confirm('重置所有数据？不可恢复！')) { appData = JSON.parse(JSON.stringify(DEFAULT_DATA)); saveData(); showPage('home'); showToast('已重置'); } }

    window.app = {
        showPage, setViewMode, prevPeriod, nextPeriod, filterByCategory, clearFilter,
        addRecord, addWeightRecord, setRecordTab,
        showContextMenu, contextEdit, contextDelete, closeEditModal, saveEditRecord,
        showAddCategory, closeAddCategory, saveCategory, deleteCategory,
        showAddPet, editPet, closePetEdit, selectAvatar, previewAvatar, savePet,
        setStatTab, setStatPeriod, renderStatsPage, renderPetStatsPage,
        addExpenseCategory, removeExpenseCategory,
        resetAllData, exportData, importData, deleteRecurring, saveBudget,
        showPetBill,
        showPetDetail, closePetDetail, showPetContextMenu, editPetFromContext, deletePetFromContext,
        showDeletePetOptions, closeDeletePetModal, confirmDeletePet,
        openLifeEventModal, closeLifeEventModal, saveLifeEvent, deleteLifeEvent,
        addTaskRecord, deleteTaskRecord, quickAddTask, quickAddTaskFromPet, renderRecentTasks
    };

    if ('serviceWorker' in navigator) {
        const swCode = `
            const CACHE_NAME = 'pet-ledger-v1';
            self.addEventListener('install', event => {
                event.waitUntil(self.skipWaiting());
            });
            self.addEventListener('fetch', event => {
                event.respondWith(fetch(event.request));
            });
            self.addEventListener('activate', event => {
                event.waitUntil(self.clients.claim());
            });
        `;
        const blob = new Blob([swCode], {type: 'application/javascript'});
        const swUrl = URL.createObjectURL(blob);
        navigator.serviceWorker.register(swUrl).catch(err => console.log('SW failed:', err));
    }

    const manifestObj = {
        name: "小账本",
        short_name: "小账本",
        start_url: "/jizhang/",
        display: "standalone",
        theme_color: "#c4b5fd",
        background_color: "#faf8f5",
        icons: [{
            src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23c4b5fd'/%3E%3Ccircle cx='50' cy='50' r='38' fill='%23ede9fe'/%3E%3Ctext x='50' y='72' font-size='55' text-anchor='middle' fill='%238b5cf6'%3E🐾%3C/text%3E%3C/svg%3E",
            sizes: "512x512",
            type: "image/svg+xml"
        }]
    };
    const manifestBlob = new Blob([JSON.stringify(manifestObj)], {type: 'application/json'});
    const manifestURL = URL.createObjectURL(manifestBlob);
    const manifestLink = document.createElement('link');
    manifestLink.rel = 'manifest';
    manifestLink.href = manifestURL;
    document.head.appendChild(manifestLink);

    loadData();
    showPage('home');
})();
</script>
</body>
