<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="毛孩账本">
    <meta name="application-name" content="毛孩账本">
    <meta name="theme-color" content="#c4b5fd">
    
    <title>毛孩账本</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link rel="manifest" id="manifest">
    
    <style>
        :root {
            --bg-page: #faf8f5;
            --card-bg: #ffffff;
            --primary: #c4b5fd;
            --primary-light: #ede9fe;
            --primary-dark: #8b5cf6;
            --accent-yellow: #fde68a;
            --accent-blue: #bae6fd;
            --text-main: #1e1e2f;
            --text-sub: #6b7280;
            --border-light: #e9e4f0;
            --shadow: 0 2px 8px rgba(0,0,0,0.02);
            --radius-card: 16px;
            --radius-btn: 30px;
            --danger: #fca5a5;
            --warning: #fde68a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-page);
            color: var(--text-main);
            min-height: 100vh;
            padding-bottom: 80px;
            -webkit-font-smoothing: antialiased;
        }

        .page { display: none; padding: 14px 14px 20px; max-width: 480px; margin: 0 auto; }
        .page.active { display: block; }

        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
        h1 { font-size: 24px; font-weight: 600; letter-spacing: -0.5px; display: flex; align-items: center; gap: 6px; }
        h1 i { color: var(--primary-dark); width: 26px; height: 26px; }
        h2 { font-size: 20px; font-weight: 600; }

        .card {
            background: var(--card-bg); border-radius: var(--radius-card);
            padding: 16px 14px; box-shadow: var(--shadow);
            border: 1px solid var(--border-light); margin-bottom: 14px;
        }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .btn {
            background: var(--primary-dark); color: white; border: none;
            padding: 10px 16px; border-radius: var(--radius-btn); font-weight: 500;
            font-size: 15px; cursor: pointer; transition: 0.15s; text-align: center;
            display: inline-flex; align-items: center; justify-content: center; gap: 6px;
        }
        .btn i { width: 18px; height: 18px; }
        .btn:disabled { opacity: 0.5; }
        .btn-outline {
            background: transparent; color: var(--text-main);
            border: 1px solid var(--border-light); box-shadow: none;
        }
        .btn-small { padding: 6px 12px; font-size: 13px; }
        .btn-danger {
            background: var(--danger); color: var(--text-main);
            padding: 6px 12px; border-radius: 20px; font-size: 13px; border: none;
        }

        input, select, textarea {
            width: 100%; padding: 10px 12px; border: 1px solid var(--border-light);
            border-radius: 14px; background: var(--card-bg); font-size: 15px;
            font-family: inherit;
        }
        .form-row { margin-bottom: 12px; }
        label { font-size: 13px; font-weight: 500; color: var(--text-sub); display: block; margin-bottom: 4px; }

        .nav-bar {
            position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.95);
            backdrop-filter: blur(8px); display: flex; justify-content: space-around;
            padding: 8px 12px 16px; border-top: 1px solid var(--border-light);
            max-width: 480px; margin: 0 auto;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center; gap: 2px;
            font-size: 11px; color: var(--text-sub); background: none; border: none;
            cursor: pointer; padding: 6px 14px; border-radius: 30px;
        }
        .nav-item i { width: 22px; height: 22px; }
        .nav-item.active { background: var(--primary-light); color: var(--primary-dark); font-weight: 500; }

        /* 滑动卡片 */
        .category-scroll {
            display: flex; gap: 10px; overflow-x: auto;
            padding: 4px 2px 12px; scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }
        .category-scroll::-webkit-scrollbar { display: none; }
        .category-card {
            flex: 0 0 120px; scroll-snap-align: start;
            background: var(--card-bg); border-radius: 20px;
            padding: 14px 10px; border: 1px solid var(--border-light);
            text-align: center; cursor: pointer;
        }
        .category-card.active { border: 2px solid var(--primary-dark); background: var(--primary-light); }
        .category-icon { font-size: 32px; margin-bottom: 6px; }

        .date-picker-bar {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 14px;
        }
        .date-picker-bar .current { font-weight: 600; font-size: 16px; }
        .date-picker-bar .nav-arrows { display: flex; gap: 8px; }
        .date-picker-bar .nav-arrows button {
            background: none; border: none; cursor: pointer; color: var(--primary-dark);
            padding: 4px; display: flex; align-items: center;
        }
        .view-switch { display: flex; gap: 8px; margin-bottom: 14px; }
        .view-switch button {
            flex: 1; padding: 8px; border-radius: 20px; border: 1px solid var(--border-light);
            background: transparent; font-weight: 500; cursor: pointer;
        }
        .view-switch button.active {
            background: var(--primary-dark); color: white; border-color: var(--primary-dark);
        }

        .day-group { margin-bottom: 16px; }
        .day-header {
            display: flex; justify-content: space-between; align-items: baseline;
            padding: 6px 2px; border-bottom: 1px dashed var(--border-light);
        }
        .day-label { font-weight: 600; font-size: 14px; }
        .day-total { color: var(--primary-dark); font-weight: 600; }
        .record-card {
            background: var(--card-bg); border-radius: 14px; padding: 12px;
            margin: 8px 0; border: 1px solid var(--border-light);
        }
        .record-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .record-cat { font-weight: 600; font-size: 15px; }
        .record-amount { font-weight: 700; font-size: 17px; color: var(--primary-dark); }
        .dashed-line { border-bottom: 1px dashed var(--border-light); margin: 8px 0; opacity: 0.6; }
        .record-meta { display: flex; justify-content: space-between; color: var(--text-sub); font-size: 12px; }

        .month-summary-card {
            background: var(--card-bg); border-radius: 14px; padding: 12px;
            margin: 8px 0; border: 1px solid var(--border-light); cursor: pointer;
        }
        .month-summary-header {
            display: flex; justify-content: space-between; align-items: center;
        }
        .month-summary-amount { font-weight: 700; font-size: 17px; color: var(--primary-dark); }
        .month-records-container { margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border-light); display: none; }
        .month-records-container.show { display: block; }

        .modal {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4); z-index: 1000;
            display: none; align-items: center; justify-content: center;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: var(--card-bg); border-radius: 24px; padding: 20px;
            width: 90%; max-width: 380px; max-height: 80vh; overflow-y: auto;
        }
        .modal-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
        .modal-actions { display: flex; gap: 10px; margin-top: 16px; }
        .modal-actions button { flex: 1; }

        .avatar {
            width: 48px; height: 48px; border-radius: 24px;
            background: var(--primary-light); overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .avatar i { width: 28px; height: 28px; color: var(--primary-dark); }

        .pet-item {
            display: flex; align-items: center; gap: 12px; padding: 10px 0;
            border-bottom: 1px solid var(--border-light);
        }
        .pet-info { flex: 1; }

        .filter-badge {
            background: var(--primary-light); color: var(--primary-dark);
            padding: 4px 12px; border-radius: 20px; font-size: 13px;
            display: inline-flex; align-items: center; gap: 6px; margin-bottom: 10px;
        }

        .offline-badge {
            position: fixed; top: 8px; left: 50%; transform: translateX(-50%);
            background: var(--warning); color: var(--text-main); padding: 4px 14px;
            border-radius: 20px; font-size: 12px; z-index: 9999; display: none;
        }
        .offline-badge.show { display: block; }

        .version-info { font-size: 11px; color: var(--text-sub); text-align: center; margin-top: 16px; }

        .context-menu {
            position: fixed; background: white; border-radius: 14px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.1); z-index: 2000;
            padding: 6px; display: none; border: 1px solid var(--border-light);
        }
        .context-menu.show { display: block; }
        .context-menu-item {
            padding: 10px 18px; cursor: pointer; border-radius: 10px;
            font-size: 14px; display: flex; align-items: center; gap: 8px;
        }
        .context-menu-item i { width: 18px; height: 18px; }
        .context-menu-item.delete { color: #dc2626; }
    </style>
</head>
<body>

<div class="offline-badge" id="offlineBadge">离线模式</div>

<div class="context-menu" id="contextMenu">
    <div class="context-menu-item" onclick="app.contextEdit()"><i data-lucide="edit"></i> 编辑</div>
    <div class="context-menu-item delete" onclick="app.contextDelete()"><i data-lucide="trash-2"></i> 删除</div>
</div>

<div class="modal" id="editModal">
    <div class="modal-content">
        <div class="modal-title">编辑记录</div>
        <input type="hidden" id="editRecordId">
        <div class="form-row"><label>金额</label><input type="number" id="editAmountInput" step="0.01"></div>
        <div class="form-row"><label>日期</label><input type="date" id="editDateInput"></div>
        <div class="form-row"><label>大类</label><select id="editCategorySelect"></select></div>
        <div class="form-row"><label>支出类别</label><select id="editExpenseCategorySelect"></select></div>
        <div class="form-row"><label>支付方式</label><select id="editPaymentSelect"><option>微信</option><option>支付宝</option><option>现金</option><option>银行卡</option></select></div>
        <div class="form-row"><label>备注</label><textarea id="editNoteInput" rows="2"></textarea></div>
        <div class="modal-actions">
            <button class="btn-outline" onclick="app.closeEditModal()">取消</button>
            <button class="btn" onclick="app.saveEditRecord()">保存</button>
        </div>
    </div>
</div>

<!-- 首页 -->
<div id="pageHome" class="page active">
    <div class="header">
        <h1><i data-lucide="paw-print"></i> 毛孩账本</h1>
        <button class="btn-outline btn-small" onclick="app.showPage('settings')"><i data-lucide="settings"></i></button>
    </div>

    <div class="view-switch">
        <button class="active" data-view="month" onclick="app.setViewMode('month')">月</button>
        <button data-view="year" onclick="app.setViewMode('year')">年</button>
    </div>

    <div class="date-picker-bar">
        <span class="current" id="currentPeriodDisplay">2026.04</span>
        <div class="nav-arrows">
            <button onclick="app.prevPeriod()"><i data-lucide="chevron-left"></i></button>
            <button onclick="app.nextPeriod()"><i data-lucide="chevron-right"></i></button>
        </div>
    </div>

    <div class="card">
        <div style="display: flex; justify-content: space-between;">
            <span id="periodTotalLabel" style="color: var(--text-sub);">本月总支出</span>
            <span style="font-size: 26px; font-weight: 700; color: var(--primary-dark);" id="periodTotalAmount">¥0.00</span>
        </div>
    </div>

    <div class="card">
        <div style="display: flex; justify-content: space-between; margin-bottom: 12px;">
            <h3 style="font-size: 16px; display: flex; align-items: center; gap: 4px;"><i data-lucide="folder"></i> 家族</h3>
            <button class="btn-outline btn-small" onclick="app.showPage('pets')">管理</button>
        </div>
        
        <!-- 滑动大类 -->
        <div class="category-scroll" id="categoryScroll"></div>
        
        <!-- 筛选标签 -->
        <div id="filterBadge" style="display: none;" class="filter-badge">
            <span id="filterText"></span>
            <i data-lucide="x" style="width: 16px; height: 16px; cursor: pointer;" onclick="app.clearFilter()"></i>
        </div>
    </div>

    <div class="card">
        <h3 style="font-size: 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 4px;"><i data-lucide="list"></i> 流水</h3>
        <div id="recordsContainer"></div>
    </div>
</div>

<!-- 记账页 -->
<div id="pageAdd" class="page">
    <div class="header"><h2>记账</h2></div>
    <div class="card">
        <div class="form-row"><label>金额</label><input type="number" id="amountInput" placeholder="0.00" step="0.01"></div>
        <div class="form-row"><label>日期</label><input type="date" id="dateInput"></div>
        <div class="form-row"><label>大类</label><select id="categoryTypeSelect"></select></div>
        <div class="form-row"><label>支出类别</label><select id="expenseCategorySelect"></select></div>
        <div class="form-row"><label>支付方式</label>
            <select id="paymentSelect"><option>微信</option><option>支付宝</option><option>现金</option><option>银行卡</option></select>
        </div>
        <div class="form-row"><label>备注</label><textarea id="noteInput" rows="2"></textarea></div>
        <button class="btn" id="saveRecordBtn" onclick="app.addRecord()"><i data-lucide="plus"></i> 保存</button>
    </div>
</div>

<!-- 宠物档案页 -->
<div id="pagePets" class="page">
    <div class="header">
        <h2>宠物档案</h2>
        <button class="btn-outline btn-small" onclick="app.showAddCategory()"><i data-lucide="plus"></i> 大类</button>
    </div>
    <div id="categoryListContainer"></div>
    
    <div id="addCategoryPanel" class="card" style="display: none;">
        <h3>新建大类</h3>
        <div class="form-row"><input type="text" id="newCategoryName" placeholder="名称"></div>
        <div class="form-row"><input type="text" id="newCategoryIcon" placeholder="图标 (cat/fish/rat)" value="cat"></div>
        <button class="btn" id="saveCategoryBtn" onclick="app.saveCategory()">创建</button>
        <button class="btn-outline" onclick="app.hideAddCategory()">取消</button>
    </div>
    
    <div id="petEditPanel" class="card" style="display: none;">
        <h3 id="petEditTitle">添加宠物</h3>
        <input type="hidden" id="editPetId"><input type="hidden" id="editPetCategoryId">
        <div class="form-row" style="display: flex; justify-content: center;">
            <div class="avatar" id="petAvatarPreview" onclick="app.selectAvatar()">
                <i data-lucide="camera"></i>
            </div>
            <input type="file" id="petAvatarInput" accept="image/*" style="display: none;" onchange="app.previewAvatar()">
        </div>
        <div class="form-row"><label>名字</label><input type="text" id="petNameInput" placeholder="咪咪"></div>
        <div class="form-row"><label>生日</label><input type="date" id="petBirthdayInput"></div>
        <button class="btn" id="savePetBtn" onclick="app.savePet()">保存</button>
        <button class="btn-outline" onclick="app.hidePetEdit()">取消</button>
    </div>
</div>

<!-- 统计页 -->
<div id="pageStats" class="page">
    <div class="header"><h2>统计分析</h2></div>
    
    <div style="display: flex; gap: 6px; margin-bottom: 14px;">
        <button class="btn-outline btn-small" data-period="day" onclick="app.setStatPeriod('day')">日</button>
        <button class="btn-outline btn-small" data-period="month" onclick="app.setStatPeriod('month')">月</button>
        <button class="btn-outline btn-small" data-period="year" onclick="app.setStatPeriod('year')">年</button>
        <input type="date" id="statDatePicker" style="width: auto; flex:1;">
    </div>

    <div class="date-picker-bar">
        <span class="current" id="statPeriodDisplay">2026.04</span>
        <div class="nav-arrows">
            <button onclick="app.statPrevPeriod()"><i data-lucide="chevron-left"></i></button>
            <button onclick="app.statNextPeriod()"><i data-lucide="chevron-right"></i></button>
        </div>
    </div>

    <div class="card">
        <div style="display: flex; justify-content: space-between;">
            <span id="statTotalLabel" style="color: var(--text-sub);">总支出</span>
            <span class="stat-value" id="statTotalAmount" style="font-size: 26px; font-weight: 700; color: var(--primary-dark);">¥0.00</span>
        </div>
    </div>

    <div class="card">
        <h3 style="font-size: 16px; margin-bottom: 8px;">大类占比</h3>
        <div style="height:180px;"><canvas id="pieChart"></canvas></div>
        <div class="drilldown-panel" id="drilldownPanel" style="display: none; background: var(--bg-page); border-radius: 14px; padding: 14px; margin-top: 12px;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                <span id="drilldownTitle"></span>
                <button class="btn-outline btn-small" onclick="app.closeDrilldown()"><i data-lucide="arrow-left"></i> 返回</button>
            </div>
            <div id="drilldownContent"></div>
        </div>
    </div>

    <div class="card">
        <h3 style="font-size: 16px; margin-bottom: 8px;">近6个月趋势</h3>
        <div style="height:160px;"><canvas id="trendChart"></canvas></div>
    </div>

    <div class="grid-2">
        <button class="btn-outline" onclick="app.exportCSV()"><i data-lucide="download"></i> CSV</button>
        <button class="btn-outline" onclick="app.exportImage()"><i data-lucide="image"></i> 图片</button>
    </div>
</div>

<!-- 设置页 -->
<div id="pageSettings" class="page">
    <div class="header"><h2>设置</h2></div>
    <div class="card">
        <h3>支出类别</h3>
        <div id="expenseCategoryList"></div>
        <div class="form-row" style="display:flex; gap:6px; margin-top:10px;">
            <input type="text" id="newExpenseCatName" placeholder="新类别">
            <button class="btn-small btn" onclick="app.addExpenseCategory()"><i data-lucide="plus"></i></button>
        </div>
    </div>
    <div class="card">
        <h3>数据管理</h3>
        <button class="btn-danger" onclick="app.resetAllData()"><i data-lucide="alert-triangle"></i> 重置所有数据</button>
    </div>
    <div class="version-info">毛孩账本 2.1 · 可爱爪印版</div>
</div>

<!-- 底部导航 -->
<div class="nav-bar">
    <button class="nav-item active" data-page="home" onclick="app.showPage('home')"><i data-lucide="home"></i> 首页</button>
    <button class="nav-item" data-page="add" onclick="app.showPage('add')"><i data-lucide="plus-circle"></i> 记账</button>
    <button class="nav-item" data-page="pets" onclick="app.showPage('pets')"><i data-lucide="cat"></i> 档案</button>
    <button class="nav-item" data-page="stats" onclick="app.showPage('stats')"><i data-lucide="chart-pie"></i> 统计</button>
</div>

<script>
(function(){
    'use strict';
    
    const DEFAULT_DATA = {
        categories: [],
        pets: [],
        records: [],
        expenseCategories: [
            { name: '食品' }, { name: '医疗' }, { name: '玩具' }, { name: '美容' }, { name: '日用' }
        ]
    };
    
    let appData = JSON.parse(JSON.stringify(DEFAULT_DATA));
    const STORAGE_KEY = 'pet_21_paw';

    let viewMode = 'month';
    let currentYear = new Date().getFullYear();
    let currentMonth = new Date().getMonth() + 1;
    let filterCategoryId = null;
    
    let statPeriod = 'month';
    let statYear = new Date().getFullYear();
    let statMonth = new Date().getMonth() + 1;
    let statDay = new Date().getDate();
    let contextRecordId = null;
    let pieChart = null, trendChart = null;
    let tempAvatar = null;

    function loadData() {
        try {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                const parsed = JSON.parse(saved);
                appData.categories = parsed.categories || [];
                appData.pets = parsed.pets || [];
                appData.records = parsed.records || [];
                appData.expenseCategories = parsed.expenseCategories || DEFAULT_DATA.expenseCategories;
            }
        } catch (e) { appData = JSON.parse(JSON.stringify(DEFAULT_DATA)); }
    }

    function saveData() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(appData)); } catch(e){} }

    function showToast(msg, ok=true) {
        const toast = document.createElement('div');
        toast.style.cssText = `position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:${ok?'#1e1e2f':'#fca5a5'}; color:white; padding:10px 20px; border-radius:30px; z-index:9999; font-size:14px;`;
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 1800);
    }

    const getToday = () => new Date().toISOString().slice(0,10);
    const formatYMD = (d) => { if (!d) return ''; const date = new Date(d); return `${date.getMonth()+1}月${date.getDate()}日`; };
    const getWeekday = (d) => ['周日','周一','周二','周三','周四','周五','周六'][new Date(d).getDay()];

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page' + pageId.charAt(0).toUpperCase() + pageId.slice(1)).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.querySelector(`.nav-item[data-page="${pageId}"]`)?.classList.add('active');
        if (pageId === 'home') renderHome();
        else if (pageId === 'add') renderAddForm();
        else if (pageId === 'pets') renderPetsPage();
        else if (pageId === 'stats') renderStatsPage();
        else if (pageId === 'settings') renderSettings();
        setTimeout(() => { if (window.lucide) lucide.createIcons(); }, 20);
    }

    function setViewMode(mode) {
        viewMode = mode;
        document.querySelectorAll('.view-switch button').forEach(b => b.classList.remove('active'));
        document.querySelector(`.view-switch button[data-view="${mode}"]`).classList.add('active');
        renderHome();
    }
    
    function prevPeriod() {
        if (viewMode === 'month') { currentMonth--; if (currentMonth < 1) { currentMonth = 12; currentYear--; } }
        else { currentYear--; }
        renderHome();
    }
    function nextPeriod() {
        if (viewMode === 'month') { currentMonth++; if (currentMonth > 12) { currentMonth = 1; currentYear++; } }
        else { currentYear++; }
        renderHome();
    }
    
    function getPeriodFilter() {
        return (r) => {
            if (!r.date) return false;
            const d = new Date(r.date);
            let match = viewMode === 'month' ? d.getFullYear() === currentYear && d.getMonth()+1 === currentMonth : d.getFullYear() === currentYear;
            if (match && filterCategoryId) match = r.categoryId === filterCategoryId;
            return match;
        };
    }

    function filterByCategory(catId) {
        filterCategoryId = catId;
        renderHome();
    }
    
    function clearFilter() {
        filterCategoryId = null;
        renderHome();
    }

    function renderHome() {
        document.getElementById('currentPeriodDisplay').innerText = viewMode === 'month' ? `${currentYear}.${String(currentMonth).padStart(2,'0')}` : `${currentYear}`;
        document.getElementById('periodTotalLabel').innerText = (viewMode === 'month' ? '本月' : '今年') + (filterCategoryId ? '该类' : '') + '总支出';
        
        let filtered = appData.records.filter(getPeriodFilter());
        const total = filtered.reduce((s, r) => s + (parseFloat(r.amount)||0), 0);
        document.getElementById('periodTotalAmount').innerText = `¥${total.toFixed(2)}`;

        // 滑动大类
        const scroll = document.getElementById('categoryScroll');
        if (!appData.categories.length) {
            scroll.innerHTML = '<div style="padding:16px;color:var(--text-sub);">点击"管理"添加大类</div>';
        } else {
            scroll.innerHTML = appData.categories.map(cat => {
                const catTotal = appData.records.filter(r => r.categoryId === cat.id && 
                    (viewMode === 'month' ? new Date(r.date).getFullYear() === currentYear && new Date(r.date).getMonth()+1 === currentMonth : new Date(r.date).getFullYear() === currentYear)
                ).reduce((s, r) => s + (parseFloat(r.amount)||0), 0);
                return `<div class="category-card ${filterCategoryId === cat.id ? 'active' : ''}" onclick="app.filterByCategory('${cat.id}')">
                    <div class="category-icon"><i data-lucide="${cat.icon || 'cat'}"></i></div>
                    <div style="font-weight:600;">${cat.name}</div>
                    <div style="color:var(--primary-dark);">¥${catTotal.toFixed(0)}</div>
                </div>`;
            }).join('');
        }

        // 筛选标签
        const badge = document.getElementById('filterBadge');
        if (filterCategoryId) {
            const cat = appData.categories.find(c => c.id === filterCategoryId);
            document.getElementById('filterText').innerHTML = `<i data-lucide="${cat?.icon||'cat'}"></i> 只看${cat?.name||''}`;
            badge.style.display = 'inline-flex';
        } else {
            badge.style.display = 'none';
        }

        const container = document.getElementById('recordsContainer');
        if (viewMode === 'month') renderMonthView(container, filtered);
        else renderYearView(container, filtered);
        
        setTimeout(() => lucide.createIcons(), 10);
    }

    function renderMonthView(container, records) {
        const byDay = {};
        records.sort((a,b)=> (b.date||'').localeCompare(a.date||'')).forEach(r => {
            if (!byDay[r.date]) byDay[r.date] = [];
            byDay[r.date].push(r);
        });
        let html = '';
        Object.keys(byDay).forEach(date => {
            const dayRecords = byDay[date];
            const dayTotal = dayRecords.reduce((s,r)=> s + (parseFloat(r.amount)||0), 0);
            html += `<div class="day-group"><div class="day-header"><span class="day-label">${formatYMD(date)} ${getWeekday(date)}</span><span class="day-total">¥${dayTotal.toFixed(2)}</span></div>`;
            dayRecords.forEach(r => {
                const cat = appData.categories.find(c=>c.id===r.categoryId);
                html += `<div class="record-card" data-record-id="${r.id}" oncontextmenu="app.showContextMenu(event,'${r.id}');return false;">
                    <div class="record-row"><span class="record-cat">${r.expenseCategory}</span><span class="record-amount">¥${parseFloat(r.amount).toFixed(2)}</span></div>
                    <div class="dashed-line"></div>
                    <div class="record-meta"><span>${r.note||'无备注'}</span><span>${cat?.name||''}</span></div>
                </div>`;
            });
            html += '</div>';
        });
        container.innerHTML = html || '<div style="padding:20px;text-align:center;color:var(--text-sub);">暂无流水</div>';
    }

    function renderYearView(container, records) {
        const byMonth = {};
        for (let i=1; i<=12; i++) byMonth[i] = { records: [], total: 0 };
        records.forEach(r => {
            const m = new Date(r.date).getMonth()+1;
            byMonth[m].records.push(r);
            byMonth[m].total += parseFloat(r.amount)||0;
        });
        let html = '';
        for (let m=1; m<=12; m++) {
            if (!byMonth[m].records.length) continue;
            html += `<div class="month-summary-card" onclick="app.toggleMonthRecords(${m})">
                <div class="month-summary-header"><span style="font-weight:600;">${currentYear}.${String(m).padStart(2,'0')}</span><span class="month-summary-amount">¥${byMonth[m].total.toFixed(2)}</span></div>
                <div class="month-records-container" id="monthRecords-${m}">`;
            const byDay = {};
            byMonth[m].records.sort((a,b)=> (b.date||'').localeCompare(a.date||'')).forEach(r => {
                if (!byDay[r.date]) byDay[r.date] = [];
                byDay[r.date].push(r);
            });
            Object.keys(byDay).forEach(date => {
                const dayRecords = byDay[date];
                const dayTotal = dayRecords.reduce((s,r)=> s + (parseFloat(r.amount)||0), 0);
                html += `<div class="day-group"><div class="day-header"><span class="day-label">${formatYMD(date)} ${getWeekday(date)}</span><span class="day-total">¥${dayTotal.toFixed(2)}</span></div>`;
                dayRecords.forEach(r => {
                    const cat = appData.categories.find(c=>c.id===r.categoryId);
                    html += `<div class="record-card" data-record-id="${r.id}" oncontextmenu="app.showContextMenu(event,'${r.id}');return false;">
                        <div class="record-row"><span class="record-cat">${r.expenseCategory}</span><span class="record-amount">¥${parseFloat(r.amount).toFixed(2)}</span></div>
                        <div class="dashed-line"></div>
                        <div class="record-meta"><span>${r.note||'无备注'}</span><span>${cat?.name||''}</span></div>
                    </div>`;
                });
                html += '</div>';
            });
            html += '</div></div>';
        }
        container.innerHTML = html || '<div style="padding:20px;text-align:center;color:var(--text-sub);">暂无流水</div>';
    }

    function toggleMonthRecords(m) { document.getElementById(`monthRecords-${m}`)?.classList.toggle('show'); }

    function showContextMenu(e, id) { e.preventDefault(); contextRecordId = id; const menu = document.getElementById('contextMenu'); menu.style.left = (e.touches?.[0]?.clientX || e.clientX) + 'px'; menu.style.top = (e.touches?.[0]?.clientY || e.clientY) + 'px'; menu.classList.add('show'); setTimeout(() => document.addEventListener('click', ()=> menu.classList.remove('show'), {once:true}), 50); }
    function contextEdit() {
        const r = appData.records.find(r=> r.id == contextRecordId); if (!r) return;
        document.getElementById('editRecordId').value = r.id;
        document.getElementById('editAmountInput').value = r.amount;
        document.getElementById('editDateInput').value = r.date;
        document.getElementById('editNoteInput').value = r.note||'';
        document.getElementById('editCategorySelect').innerHTML = appData.categories.map(c=>`<option value="${c.id}" ${c.id===r.categoryId?'selected':''}>${c.name}</option>`).join('');
        document.getElementById('editExpenseCategorySelect').innerHTML = appData.expenseCategories.map(ec=>`<option ${ec.name===r.expenseCategory?'selected':''}>${ec.name}</option>`).join('');
        document.getElementById('editPaymentSelect').value = r.payment;
        document.getElementById('editModal').classList.add('show');
    }
    function contextDelete() {
        if (!confirm('删除这条记录？')) return;
        appData.records = appData.records.filter(r=> r.id != contextRecordId);
        saveData(); renderHome(); showToast('已删除');
    }
    function closeEditModal() { document.getElementById('editModal').classList.remove('show'); }
    function saveEditRecord() {
        const r = appData.records.find(r=> r.id == document.getElementById('editRecordId').value); if (!r) return;
        r.amount = parseFloat(document.getElementById('editAmountInput').value);
        r.date = document.getElementById('editDateInput').value;
        r.categoryId = document.getElementById('editCategorySelect').value;
        r.expenseCategory = document.getElementById('editExpenseCategorySelect').value;
        r.payment = document.getElementById('editPaymentSelect').value;
        r.note = document.getElementById('editNoteInput').value;
        saveData(); closeEditModal(); renderHome(); showToast('已更新');
    }

    function renderAddForm() {
        document.getElementById('dateInput').value = getToday();
        document.getElementById('categoryTypeSelect').innerHTML = appData.categories.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
        document.getElementById('expenseCategorySelect').innerHTML = appData.expenseCategories.map(ec=>`<option>${ec.name}</option>`).join('');
    }
    function addRecord() {
        const amt = parseFloat(document.getElementById('amountInput').value);
        if (!amt || amt<=0) { showToast('金额无效', false); return; }
        if (!appData.categories.length) { showToast('请先创建大类', false); return; }
        appData.records.push({
            id: Date.now()+Math.random(), amount: amt, date: document.getElementById('dateInput').value,
            categoryId: document.getElementById('categoryTypeSelect').value,
            expenseCategory: document.getElementById('expenseCategorySelect').value,
            payment: document.getElementById('paymentSelect').value,
            note: document.getElementById('noteInput').value
        });
        saveData(); showToast('已保存'); showPage('home');
    }

    function renderPetsPage() {
        const container = document.getElementById('categoryListContainer');
        if (!appData.categories.length) { container.innerHTML = '<div class="card" style="text-align:center;">暂无大类</div>'; return; }
        let html = '';
        appData.categories.forEach(cat => {
            html += `<div class="card" oncontextmenu="app.deleteCategory('${cat.id}');return false;">
                <div style="display:flex; justify-content:space-between;"><h3><i data-lucide="${cat.icon||'cat'}"></i> ${cat.name}</h3><button class="btn-outline btn-small" onclick="app.showAddPet('${cat.id}')"><i data-lucide="plus"></i></button></div>`;
            const pets = appData.pets.filter(p=> p.categoryId===cat.id);
            pets.forEach(p => {
                html += `<div class="pet-item">
                    <div class="avatar" onclick="app.editPet('${p.id}')">${p.avatar ? `<img src="${p.avatar}">` : `<i data-lucide="${cat.icon||'cat'}"></i>`}</div>
                    <div class="pet-info"><b>${p.name}</b><br><small>${p.birthday||'未设置生日'}</small></div>
                    <button class="btn-outline btn-small" onclick="app.editPet('${p.id}')"><i data-lucide="edit"></i></button>
                </div>`;
            });
            html += '</div>';
        });
        container.innerHTML = html; lucide.createIcons();
    }
    
    function deleteCategory(id) { if (!confirm('删除大类？')) return; appData.categories = appData.categories.filter(c=>c.id!==id); saveData(); renderPetsPage(); showToast('已删除'); }
    function showAddCategory() { document.getElementById('addCategoryPanel').style.display='block'; }
    function hideAddCategory() { document.getElementById('addCategoryPanel').style.display='none'; }
    function saveCategory() {
        const name = document.getElementById('newCategoryName').value.trim(); if (!name) return;
        appData.categories.push({ id: Date.now()+'', name, icon: document.getElementById('newCategoryIcon').value||'cat' });
        saveData(); hideAddCategory(); renderPetsPage(); showToast('已创建');
    }
    
    function showAddPet(catId) {
        document.getElementById('editPetId').value=''; document.getElementById('editPetCategoryId').value=catId;
        document.getElementById('petNameInput').value=''; document.getElementById('petBirthdayInput').value='';
        tempAvatar = null;
        document.getElementById('petAvatarPreview').innerHTML = '<i data-lucide="camera"></i>';
        document.getElementById('petEditPanel').style.display='block';
        lucide.createIcons();
    }
    function editPet(id) {
        const p = appData.pets.find(p=>p.id===id); if(!p) return;
        document.getElementById('editPetId').value=id; document.getElementById('editPetCategoryId').value=p.categoryId;
        document.getElementById('petNameInput').value=p.name; document.getElementById('petBirthdayInput').value=p.birthday||'';
        tempAvatar = p.avatar || null;
        const preview = document.getElementById('petAvatarPreview');
        preview.innerHTML = p.avatar ? `<img src="${p.avatar}">` : '<i data-lucide="camera"></i>';
        document.getElementById('petEditPanel').style.display='block';
        lucide.createIcons();
    }
    function hidePetEdit() { document.getElementById('petEditPanel').style.display='none'; }
    
    function selectAvatar() { document.getElementById('petAvatarInput').click(); }
    function previewAvatar() {
        const file = document.getElementById('petAvatarInput').files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = e => {
                tempAvatar = e.target.result;
                document.getElementById('petAvatarPreview').innerHTML = `<img src="${tempAvatar}">`;
            };
            reader.readAsDataURL(file);
        }
    }
    
    function savePet() {
        const id = document.getElementById('editPetId').value;
        const name = document.getElementById('petNameInput').value.trim(); if (!name) return;
        if (id) {
            const p = appData.pets.find(p=>p.id===id);
            p.name=name; p.birthday=document.getElementById('petBirthdayInput').value;
            if (tempAvatar !== undefined) p.avatar = tempAvatar;
        } else {
            appData.pets.push({
                id: Date.now()+'', categoryId: document.getElementById('editPetCategoryId').value,
                name, birthday: document.getElementById('petBirthdayInput').value,
                avatar: tempAvatar || ''
            });
        }
        saveData(); hidePetEdit(); renderPetsPage(); showToast('已保存');
    }

    function setStatPeriod(p) { statPeriod = p; updateStatDisplay(); renderStatsPage(); }
    function statPrevPeriod() {
        if (statPeriod==='month') { statMonth--; if(statMonth<1){statMonth=12; statYear--;} }
        else if (statPeriod==='year') statYear--;
        else { const d=new Date(statYear, statMonth-1, statDay-1); statYear=d.getFullYear(); statMonth=d.getMonth()+1; statDay=d.getDate(); }
        updateStatDisplay(); renderStatsPage();
    }
    function statNextPeriod() {
        if (statPeriod==='month') { statMonth++; if(statMonth>12){statMonth=1; statYear++;} }
        else if (statPeriod==='year') statYear++;
        else { const d=new Date(statYear, statMonth-1, statDay+1); statYear=d.getFullYear(); statMonth=d.getMonth()+1; statDay=d.getDate(); }
        updateStatDisplay(); renderStatsPage();
    }
    function updateStatDisplay() {
        let t=''; if (statPeriod==='day') t=`${statYear}.${String(statMonth).padStart(2,'0')}.${String(statDay).padStart(2,'0')}`;
        else if (statPeriod==='month') t=`${statYear}.${String(statMonth).padStart(2,'0')}`; else t=`${statYear}`;
        document.getElementById('statPeriodDisplay').innerText = t;
        document.getElementById('statTotalLabel').innerText = statPeriod==='day'?'当日':(statPeriod==='month'?'本月':'今年')+'总支出';
        const picker = document.getElementById('statDatePicker');
        picker.value = `${statYear}-${String(statMonth).padStart(2,'0')}-${String(statDay).padStart(2,'0')}`;
        picker.onchange = () => { const d=new Date(picker.value); statYear=d.getFullYear(); statMonth=d.getMonth()+1; statDay=d.getDate(); renderStatsPage(); };
    }
    function getStatFilter() {
        return (r) => { if(!r.date) return false; const d=new Date(r.date); if(statPeriod==='day') return d.getFullYear()===statYear && d.getMonth()+1===statMonth && d.getDate()===statDay; if(statPeriod==='month') return d.getFullYear()===statYear && d.getMonth()+1===statMonth; return d.getFullYear()===statYear; };
    }
    function renderStatsPage() {
        updateStatDisplay();
        const filtered = appData.records.filter(getStatFilter());
        const total = filtered.reduce((s,r)=> s+(parseFloat(r.amount)||0),0);
        document.getElementById('statTotalAmount').innerText = `¥${total.toFixed(2)}`;
        const catTotals = {}; appData.categories.forEach(c=> catTotals[c.id]=0);
        filtered.forEach(r=> { if (catTotals.hasOwnProperty(r.categoryId)) catTotals[r.categoryId] += parseFloat(r.amount)||0; });
        const ctx = document.getElementById('pieChart').getContext('2d');
        if (pieChart) pieChart.destroy();
        pieChart = new Chart(ctx, { type:'pie', data:{ labels: appData.categories.map(c=>c.name), datasets:[{ data: appData.categories.map(c=>catTotals[c.id]||0), backgroundColor: ['#c4b5fd','#fde68a','#bae6fd','#a7f3d0','#fbcfe8','#fdba74'] }] }, options:{ onClick:(e,item)=>{ if(item?.length){ const cat=appData.categories[item[0].index]; const catRecs=filtered.filter(r=>r.categoryId===cat.id); const exp={}; catRecs.forEach(r=> exp[r.expenseCategory]=(exp[r.expenseCategory]||0)+(parseFloat(r.amount)||0)); document.getElementById('drilldownTitle').innerHTML=`<i data-lucide="${cat.icon||'cat'}"></i> ${cat.name}`; document.getElementById('drilldownContent').innerHTML=Object.entries(exp).map(([n,a])=>`<div style="display:flex;justify-content:space-between;padding:6px 0;"><span>${n}</span><span>¥${a.toFixed(2)}</span></div>`).join('')||'暂无'; document.getElementById('drilldownPanel').style.display='block'; lucide.createIcons(); } } }});
        const months=[], totals=[]; const now=new Date();
        for(let i=5; i>=0; i--) { const d=new Date(now.getFullYear(), now.getMonth()-i, 1); months.push(`${d.getMonth()+1}月`); totals.push(appData.records.filter(r=>{ if(!r.date) return false; const rd=new Date(r.date); return rd.getFullYear()===d.getFullYear() && rd.getMonth()===d.getMonth(); }).reduce((s,r)=> s+(parseFloat(r.amount)||0),0)); }
        const tCtx = document.getElementById('trendChart').getContext('2d');
        if (trendChart) trendChart.destroy();
        trendChart = new Chart(tCtx, { type:'bar', data:{ labels:months, datasets:[{ data:totals, backgroundColor:'#c4b5fd' }] }, options:{ plugins:{ legend:{ display:false } } } });
    }
    function closeDrilldown() { document.getElementById('drilldownPanel').style.display='none'; }
    function exportCSV() { const f=appData.records.filter(getStatFilter()); if(!f.length){ showToast('暂无记录',false); return; } let csv='日期,金额,大类,类别,支付,备注\n'; f.forEach(r=>{ const c=appData.categories.find(c=>c.id===r.categoryId); csv+=`${r.date},${r.amount},${c?.name||''},${r.expenseCategory},${r.payment},${r.note}\n`; }); const b=new Blob(['\uFEFF'+csv],{type:'text/csv'}); const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download='export.csv'; a.click(); showToast('导出中'); }
    function exportImage() { html2canvas(document.getElementById('pageStats')).then(c=>{ const a=document.createElement('a'); a.download='stats.png'; a.href=c.toDataURL(); a.click(); showToast('已保存'); }); }
    function renderSettings() {
        document.getElementById('expenseCategoryList').innerHTML = appData.expenseCategories.map((ec,i)=>`<div style="display:flex; justify-content:space-between; padding:6px 0;"><span>${ec.name}</span><button class="btn-outline btn-small" onclick="app.removeExpenseCategory(${i})"><i data-lucide="trash-2"></i></button></div>`).join('');
        lucide.createIcons();
    }
    function addExpenseCategory() { const n=document.getElementById('newExpenseCatName').value.trim(); if(!n) return; appData.expenseCategories.push({ name:n }); saveData(); renderSettings(); showToast('已添加'); }
    function removeExpenseCategory(i) { appData.expenseCategories.splice(i,1); saveData(); renderSettings(); }
    function resetAllData() { if(confirm('重置所有数据？')) { appData = JSON.parse(JSON.stringify(DEFAULT_DATA)); saveData(); showPage('home'); showToast('已重置'); } }

    window.app = { showPage, setViewMode, prevPeriod, nextPeriod, filterByCategory, clearFilter, toggleMonthRecords, showContextMenu, contextEdit, contextDelete, closeEditModal, saveEditRecord, showAddCategory, hideAddCategory, saveCategory, showAddPet, editPet, hidePetEdit, selectAvatar, previewAvatar, savePet, deleteCategory, addRecord, setStatPeriod, statPrevPeriod, statNextPeriod, closeDrilldown, exportCSV, exportImage, addExpenseCategory, removeExpenseCategory, resetAllData };
    loadData(); showPage('home');
})();
</script>
